<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Blog | bagusmw.me</title>
    <link rel="icon" type="image/svg+xml" href="https://bagusmw.me/i/icon.svg" />
    <style>
        body {
            line-height: 1.5;
            max-width: 650px;
            margin: 50px auto;
            padding: 20px;
        }

        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }

        .name-link {
            color: black;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);
            text-decoration: none;
            font-size: 1.5em;
            font-weight: bold;
        }

        .nav-icons {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .nav-icons a {
            color: #444;
            text-decoration: none;
            display: flex;
            align-items: center;
            transition: color 0.2s;
        }

        .nav-icons a:hover {
            color: #000;
        }

        .nav-icons svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        /* Tooltip */
        .nav-icons a {
            position: relative;
        }

        .nav-icons a::after {
            content: attr(aria-label);
            position: absolute;
            bottom: -28px;
            left: 50%;
            transform: translateX(-50%);
            background: #111;
            color: #fff;
            font-size: 0.7em;
            padding: 2px 7px;
            border-radius: 4px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.15s;
        }

        .nav-icons a:hover::after {
            opacity: 1;
        }

        .lang-selector {
            position: fixed;
            bottom: 1rem;
            right: 1rem;
        }

        .lang-selector select {
            padding: .5rem .75rem;
            border-radius: .375rem;
            background: #1F2937;
            color: #F9FAFB;
            border: 1px solid #4B5563;
        }

        .name-link {
            color: black;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);
            text-decoration: none;
            font-size: 1.5em;
            font-weight: bold;
        }

        #posts-wrapper .post {
            margin-bottom: 0px;
        }

        #posts-wrapper .post-title {
            margin: 0;
            padding: 2px 0;
        }

        .tabs {
            display: flex;
            gap: 4px;
            margin: 16px 0 8px;
            border-bottom: 1px solid #E5E7EB;
            padding-bottom: 0;
        }

        .tab-btn {
            background: none;
            border: none;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 0.95em;
            color: #6B7280;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
            transition: color 0.15s, border-color 0.15s;
        }

        .tab-btn:hover {
            color: #111827;
        }

        .tab-btn.active {
            color: #111827;
            border-bottom-color: #111827;
            font-weight: 500;
        }
    </style>
</head>

<body class="page">

    <header>
        <nav>
            <a href="/" class="name-link">Bagus Muhammad Wijaksono</a>
            <div class="nav-icons">
                <!-- Blog icon (pencil/book) -->
                <a href="/blog" aria-label="Blog">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zm2.92 1.83H5v-.71l9.06-9.06.71.71-8.85 9.06zM20.71 5.63l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83a1 1 0 0 0 0-1.41z" />
                    </svg>
                </a>
                <!-- LinkedIn icon -->
                <a href="https://linkedin.com" aria-label="LinkedIn" target="_blank" rel="noopener">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z" />
                    </svg>
                </a>
                <!-- GitHub icon -->
                <a href="https://github.com/baguswjksn" aria-label="GitHub" target="_blank" rel="noopener">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12" />
                    </svg>
                </a>
            </div>
        </nav>
    </header>

    <div class="tabs">
        <button class="tab-btn active" data-tab="featured">Featured</button>
        <button class="tab-btn" data-tab="all">All</button>
    </div>

    <div id="posts-wrapper"></div>

    <div class="lang-selector">
        <select id="themeLangSelect" aria-label="Language">
            <option value="en">English</option>
            <option value="id">Indonesian</option>
        </select>
    </div>

    <script defer>
        const posts = {
            en: [
                { title: "2026-02-25 - Fullmetal Alchemist: Brotherhood", link: "fullmetal-alchemist-brotherhood", featured: false },
                { title: "2026-02-20 - Girl's Last Tour", link: "girls-last-tour", featured: false },
                { title: "2026-02-11 - The Dark Forest", link: "dark-forest", featured: false },
                { title: "2026-01-28 - Yotsuba&!", link: "yotsuba", featured: false },
                { title: "2025-11-06 - Nineteen Eighty-Four", link: "1984", featured: false },
                { title: "2025-05-02 - The Brothers Karamazov", link: "brothers-karamazov", featured: false },
                { title: "2025-03-12 - The Three-Body Problem", link: "three-body-problem", featured: false },
                { title: "2025-02-06 - Kakeibo", link: "kakeibo", featured: true },
                { title: "2024-12-13 - Web Servers Problem", link: "too-many-web-servers", featured: true },
                { title: "2024-12-01 - You Just Need a .db File", link: "sqlite", featured: true },
                { title: "2024-11-05 - Unnecessary Complexity", link: "unnecessary-complexity", featured: true },
                { title: "2021-03-20 - Confessions", link: "confessions", featured: false }
            ],
            id: [
                { title: "2026-02-25 - Fullmetal Alchemist: Brotherhood", link: "fullmetal-alchemist-brotherhood", featured: false },
                { title: "2026-02-20 - Girl's Last Tour", link: "girls-last-tour", featured: false },
                { title: "2026-02-11 - Belantara", link: "dark-forest", featured: false },
                { title: "2026-01-28 - Yotsuba&!", link: "yotsuba", featured: false },
                { title: "2025-11-06 - Nineteen Eighty-Four", link: "1984", featured: false },
                { title: "2025-05-02 - The Brothers Karamazov", link: "brothers-karamazov", featured: false },
                { title: "2025-03-12 - Trisurya", link: "three-body-problem", featured: false },
                { title: "2025-02-06 - Kakeibo", link: "kakeibo", featured: true },
                { title: "2024-12-13 - Masalah Web Server", link: "too-many-web-servers", featured: true },
                { title: "2024-12-01 - Yang kamu butuhin cuma file .db", link: "sqlite", featured: true },
                { title: "2024-11-05 - Kompleksitas Berlebihan", link: "unnecessary-complexity", featured: true },
                { title: "2021-03-20 - Confessions", link: "confessions", featured: false }
            ]
        };

        const langSelect = document.getElementById("themeLangSelect");
        const postsWrapper = document.getElementById("posts-wrapper");
        const tabBtns = document.querySelectorAll(".tab-btn");

        let currentTab = "featured";

        function renderPosts(lang = "en") {
            const list = posts[lang];
            const filtered = currentTab === "featured" ? list.filter(p => p.featured) : list;
            postsWrapper.innerHTML = filtered.map(p => `
                <div class="post">
                    <p class="post-title">
                        <a href="${p.link}">${p.title}</a>
                    </p>
                </div>
            `).join("");
        }

        tabBtns.forEach(btn => {
            btn.addEventListener("click", () => {
                tabBtns.forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                currentTab = btn.dataset.tab;
                renderPosts(langSelect.value);
            });
        });

        langSelect.addEventListener("change", () => {
            renderPosts(langSelect.value);
        });

        renderPosts("en");
    </script>

</body>

</html>
